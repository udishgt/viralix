services:
  - type: web
    name: viralix-backend
    runtime: docker
    plan: starter
    branch: main
    autoDeployTrigger: commit
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /health
    disk:
      name: viralix-data
      mountPath: /var/data/viralix
      sizeGB: 5
    envVars:
      - key: VIRALIX_DATA_DIR
        value: /var/data/viralix
      - key: FFMPEG_PATH
        value: /usr/bin/ffmpeg
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
  - type: web
    name: viralix-frontend
    runtime: static
    branch: main
    autoDeployTrigger: commit
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://viralix-backend.onrender.com
